<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>의학과 2학년 시간표</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#f0eee8">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="시간표">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page">
  <header class="topbar">
    <div class="titlewrap">
      <div class="title">의학과 2학년 시간표 — <span id="weekLabel">·</span><small id="weekRange"></small></div>
      <div class="meta"><span id="verBadge" class="badge" hidden></span><span id="srcBadge" class="badge"></span><span id="updated"></span><button id="btnHl" class="hlbtn" type="button" aria-label="개인 하이라이트 설정" title="개인 하이라이트 설정"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg></button></div>
    </div>
    <nav class="weeknav">
      <button id="btnPrev" class="nbtn" aria-label="이전">◀</button>
      <button id="tabDay" class="nbtn tab">오늘</button>
      <button id="tabWeek" class="nbtn tab">주간</button>
      <button id="tabTwo" class="nbtn tab">2주간</button>
      <button id="tabMonth" class="nbtn tab">월간</button>
      <button id="btnNext" class="nbtn" aria-label="다음">▶</button>
    </nav>
  </header>

  <div id="grid" class="gridc" aria-live="polite"></div>

  <div id="notice" class="notice" hidden></div>
</div>

<div id="sheetpop" class="sheetpop" hidden>
  <div class="sheetpop-inner">
    <div id="popBody"></div>
    <button id="popClose" class="nbtn">닫기</button>
  </div>
</div>
<div id="hlpop" class="sheetpop" hidden>
  <div class="sheetpop-inner">
    <div class="hltitle">개인 하이라이트</div>
    <div class="hldesc">본인 이름이나 키워드를 <b>한 줄에 하나씩</b> 넣으면 그 줄이 <b>이 기기에서만</b> 빨갛게 표시돼요. 다른 사람이 볼 때는 영향이 없어요.<br>교수님은 <b>(이름, 과)</b> 형태로 넣으면 같은 이름 다른 과와 안 헷갈려요.</div>
    <textarea id="hlInput" class="hlinput" rows="6" placeholder="예: 홍길동&#10;(김철수, EM)"></textarea>
    <button id="hlSave" class="nbtn" type="button">저장</button>
    <button id="hlClose" class="nbtn hlclose" type="button">닫기</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
